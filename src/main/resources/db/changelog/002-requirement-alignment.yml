databaseChangeLog:
  - changeSet:
      id: 002-events-operational-state
      author: codex
      changes:
        - addColumn:
            tableName: events
            columns:
              - column:
                  name: remaining_ticket_count
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: sold_ticket_count
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: flagged
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - update:
            tableName: events
            columns:
              - column:
                  name: remaining_ticket_count
                  valueComputed: total_ticket_count
              - column:
                  name: sold_ticket_count
                  valueNumeric: 0

  - changeSet:
      id: 003-resale-transaction-audit
      author: codex
      changes:
        - addColumn:
            tableName: resale_listings
            columns:
              - column:
                  name: buyer_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_resale_listings_buyer
                    references: users(id)
              - column:
                  name: purchased_at
                  type: timestamp with time zone

  - changeSet:
      id: 004-event-validators
      author: codex
      changes:
        - createTable:
            tableName: event_validators
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_event_validators_event
                    references: events(id)
              - column:
                  name: validator_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_event_validators_user
                    references: users(id)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: event_validators
            columnNames: event_id, validator_id
            constraintName: uk_event_validators_event_user

  - changeSet:
      id: 005-disputes
      author: codex
      changes:
        - createTable:
            tableName: disputes
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: reporter_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_disputes_reporter
                    references: users(id)
              - column:
                  name: resale_listing_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_disputes_resale_listing
                    references: resale_listings(id)
              - column:
                  name: ticket_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_disputes_ticket
                    references: tickets(id)
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: resolution_note
                  type: text
              - column:
                  name: reviewed_by
                  type: uuid
              - column:
                  name: reviewed_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

  - changeSet:
      id: 009-ticket-round-section-sale-policy
      author: codex
      changes:
        - addColumn:
            tableName: tickets
            columns:
              - column:
                  name: event_round_id
                  type: uuid
              - column:
                  name: sale_start_at
                  type: timestamp with time zone
              - column:
                  name: sale_end_at
                  type: timestamp with time zone

  - changeSet:
      id: 006-events-admin-cancel-policy
      author: codex
      changes:
        - addColumn:
            tableName: events
            columns:
              - column:
                  name: admin_canceled
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 007-events-sessions-ticket-sections
      author: codex
      changes:
        - addColumn:
            tableName: events
            columns:
              - column:
                  name: event_start_at
                  type: timestamp with time zone
              - column:
                  name: event_end_at
                  type: timestamp with time zone
        - update:
            tableName: events
            columns:
              - column:
                  name: event_start_at
                  valueComputed: event_at
              - column:
                  name: event_end_at
                  valueComputed: event_at
        - addNotNullConstraint:
            tableName: events
            columnName: event_start_at
            columnDataType: timestamp with time zone
        - addNotNullConstraint:
            tableName: events
            columnName: event_end_at
            columnDataType: timestamp with time zone
        - addColumn:
            tableName: tickets
            columns:
              - column:
                  name: section_name
                  type: varchar(80)
                  defaultValue: GENERAL
                  constraints:
                    nullable: false
              - column:
                  name: resale_enabled
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: resale_cap_rate
                  type: int
                  defaultValueNumeric: 10000
                  constraints:
                    nullable: false

  - changeSet:
      id: 008-event-rounds
      author: codex
      changes:
        - addColumn:
            tableName: events
            columns:
              - column:
                  name: venue_place_id
                  type: varchar(120)
        - createTable:
            tableName: event_rounds
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_event_rounds_event
                    references: events(id)
                    deleteCascade: true
              - column:
                  name: title
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: event_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: time
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: time
                  constraints:
                    nullable: false
              - column:
                  name: sale_start_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: sale_end_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: use_global_sale_period
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

  - changeSet:
      id: 010-normalize-event-ticket-status
      author: codex
      changes:
        - sql:
            sql: |
              UPDATE events
              SET status = CASE
                WHEN status = 'DRAFT' THEN 'DRAFT'
                WHEN status IN ('PUBLISHED', 'ACTIVE', 'SALES_OPEN', 'SALES_CLOSED', 'ENDED') THEN 'PUBLISHED'
                WHEN status = 'INACTIVE' THEN 'INACTIVE'
                WHEN status IN ('CANCELED', 'CANCELLED') THEN 'CANCELLED'
                ELSE 'PUBLISHED'
              END;
              UPDATE tickets
              SET status = CASE
                WHEN status = 'AVAILABLE' THEN 'AVAILABLE'
                WHEN status IN ('SOLD', 'OWNED') THEN 'SOLD'
                WHEN status = 'LISTED' THEN 'LISTED'
                WHEN status = 'USED' THEN 'USED'
                WHEN status = 'ISSUED' THEN 'AVAILABLE'
                WHEN status IN ('EXPIRED', 'CANCELED', 'CANCELLED') THEN 'CANCELLED'
                ELSE status
              END;
