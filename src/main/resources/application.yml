spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/blockchain_backend
    username: blockchain
    password: blockchain
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    issuer: blockchain-2026-team4
    secret: ${JWT_SECRET:local-development-secret-local-development-secret}
    access-token-expiration-minutes: 120
    refresh-token-expiration-days: 14
  dev-auth:
    enabled: ${DEV_AUTH_ENABLED:true}
    token: ${DEV_ADMIN_TOKEN:local-dev-admin-token}
    user-id: ${DEV_ADMIN_USER_ID:00000000-0000-0000-0000-000000000004}
    wallet-address: ${DEV_ADMIN_WALLET_ADDRESS:0x0000000000000000000000000000000000000004}
    email: ${DEV_ADMIN_EMAIL:dev-admin@local.test}
    password: ${DEV_ADMIN_PASSWORD:Admin1234!}
    display-name: ${DEV_ADMIN_DISPLAY_NAME:Local Dev Super Admin}
  errors:
    include-stack-trace: true
    stack-trace-depth: 8
  storage:
    image-directory: ${IMAGE_DIRECTORY:./storage/images}
    public-url-prefix: ${IMAGE_PUBLIC_URL_PREFIX:/images}
  blockchain:
    enabled: false
    network-name: local-anvil
    rpc-url: ${BLOCKCHAIN_RPC_URL:http://127.0.0.1:8545}
    chain-id: ${BLOCKCHAIN_CHAIN_ID:31337}
    contract-address: ${TRUST_TICKET_CONTRACT_ADDRESS:}
    operator-private-key: ${BLOCKCHAIN_OPERATOR_PRIVATE_KEY:}
    gas-price-wei: ${BLOCKCHAIN_GAS_PRICE_WEI:1000000000}
    gas-limit: ${BLOCKCHAIN_GAS_LIMIT:6500000}
